# --- Ports & Basic Setup ---
http_port 3128

# Disable caching (pure forward proxy)
cache deny all
cache_store_log none

# --- ACLs ---
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

acl allowed_sites dstdomain "/etc/squid/acl/whitelist.txt"

# --- Access Rules (order matters!) ---
# Deny non-standard ports
http_access deny !Safe_ports

# CONNECT (HTTPS tunneling) only to allowed sites on 443
http_access deny CONNECT !SSL_ports
http_access deny CONNECT !allowed_sites

# Allow whitelisted sites, deny everything else
http_access allow allowed_sites
http_access deny all

# --- Logging ---
access_log /var/log/squid/access.log squid
cache_log /dev/null

# --- Privacy / Headers ---
forwarded_for delete
via off
